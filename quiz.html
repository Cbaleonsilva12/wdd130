<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Forms example with HTML and CSS">
    <meta name="author" content="Carlos Baleón">
    <link rel="stylesheet" href="styles/quiz.css">
 <title>Web Design Quiz</title>
</head>
<body>
    <h1> Basic HTML and CSS Quiz </h1>

    <form>
        <label for="q1">1. What HTML means?</label><br>
        <input type="text" id="q1" name="q1"><br>

        <label for="q2">2. What is the main purpose of HTML and CSS?</label><br>
        <textarea id="q2" name="q2"></textarea><br>

        <label for="q3">3. Which of the following is a valid HTML comment?</label><br>
        <select id="q3" name="q3">
            <option value="0" selected disabled>Select One Option...</option>
            <option value="1">&lt;!-- This is a comment --&gt;</option>
            <option value="2">/* This is a comment */</option>
            <option value="3">// This is a comment</option>

        </select><br>

        <label for="q4">4. Type a valid value for a width attribute</label><br>
        <input type="number" name="q4" id="q4"><br>

        <button type="submit">Submit Quiz</button>







    </form>
</body>
</html>
