<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Information about the contact channels.">
    <meta name="author" content="Carlos Baleón Silva">
    <link rel="stylesheet" href="styles/rafting.css">
    <title>Dry Oar Rafting: Contact Us!</title>
</head>

<body>
    <header class="grid">
        <img src="images/logo.png" alt="Dry Oar Rafting Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <div class="contact">
            <h2>Contact Us</h2>
        
            <h3>Our Address</h3>
            <p>123 WEST 21ST, RIVERTON, UTAH</p>

            <h3>Phone Number</h3>
            <p>+1 800 984 372</p>

            <h3>Email Address</h3>
            <p>dryoar_rafting@outlook.com</p>

            <h3>Find Us</h3>
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d34405.52196396594!2d-111.8647363138563!3d40.34129813117498!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x875284282bc1ef27%3A0x33d4986974170b52!2sRiverton%2C%20Utah%2C%20EE.%20UU.!5e0!3m2!1ses-419!2smx!4v1722137274467!5m2!1ses-419!2smx" width="350" height="250" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>

            <h3>Our Team</h3>
            <div class="team">
                <figure>
                    <img src="images/employee1.jpg" alt="Employee 1">
                    <figcaption>John Doe - Guide</figcaption>
                </figure>
                <figure>
                    <img src="images/employee2.jpg" alt="Employee 2">
                    <figcaption>Jane Smith - Office Manager</figcaption>
                </figure>
                <figure>
                    <img src="images/employee3.jpg" alt="Employee 3">
                    <figcaption>Emily Johnson - Reservation Specialist</figcaption>
                </figure>
            </div>

            <h3>Contact Form</h3>
            <form>
                <label for="name">Name:</label><br>
                <input type="text" id="name" name="name" required><br>

                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" required><br>

                <label>Purpose of Message:</label><br>
                <input type="radio" id="general" name="purpose" value="general">
                <label for="general">General Inquiry</label><br>
                <input type="radio" id="reservation" name="purpose" value="reservation">
                <label for="reservation">Reservation Question</label><br>
                <input type="radio" id="suggestion" name="purpose" value="suggestion">
                <label for="suggestion">Website Suggestion</label><br>

                <label for="message">Message:</label><br>
                <textarea id="message" name="message" rows="5" required></textarea><br>

                <input type="checkbox" id="subscribe" name="subscribe">
                <label for="subscribe">Please subscribe me to the monthly newsletter</label><br>

                <button type="submit">Submit</button>
            </form>
        </div>
    </main>

    <footer>
        <p>©2024 Dry Oar Company | Carlos Baleón Silva</p>
        <a href="https://www.facebook.com/"><img src="images/facebook.png" alt="Facebook Logo"></a>
        <a href="https://www.instagram.com/"><img src="images/instagram.png" alt="Instagram Logo"></a>
        <a href="https://www.threads.net/"><img src="images/threads.png" alt="Threads Logo"></a>
        <a href="https://www.tiktok.com/"><img src="images/tiktok.png" alt="TikTok Logo"></a>
    </footer>
</body>

</html>
